services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexabit
      POSTGRES_PASSWORD: nexabit
      POSTGRES_DB: nexabit_network
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '4000:4000'
    environment:
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000
      RATE_LIMIT: 60
      DATABASE_URL: postgresql://nexabit:nexabit@postgres:5432/nexabit_network
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
